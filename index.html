<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ตารางเวลาว่าง</title>
<meta name="description" content="ตารางลงชื่อเวลาว่างของกลุ่ม" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23EFEAD9'/%3E%3Cpath d='M5 5 L27 27 M5 11 L21 27 M5 17 L15 27 M5 23 L9 27 M27 5 L5 27 M27 11 L11 27 M27 17 L17 27 M27 23 L23 27' stroke='%232C2620' stroke-width='1.4' opacity='.55'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500;600;700&family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --paper:#EFEAD9;
  --paper-deep:#E5DDC4;
  --ink:#2C2620;
  --ink-soft:#6B6052;
  --line:#CBBD9A;
  --line-soft:#DCD2B4;
  --saffron:#B07A1F;
  --rust:#A6552E;     /* pong  */
  --moss:#5B6C42;     /* panat */
  --indigo:#3D5066;   /* chani */
  --card-shadow: 0 1px 0 rgba(44,38,32,.05), 0 10px 24px -14px rgba(44,38,32,.35);
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Sarabun','Noto Sans Thai',sans-serif;
  -webkit-font-smoothing:antialiased;
}
button,select,textarea,input{font-family:inherit;}
::selection{background:#D9C089;}

/* ---- visible keyboard focus, stitched style ---- */
a:focus-visible,button:focus-visible,select:focus-visible,textarea:focus-visible{
  outline:2px dashed var(--ink);
  outline-offset:2px;
  border-radius:2px;
}

@media (prefers-reduced-motion: reduce){
  *{transition:none !important;}
}

.app{max-width:1080px;margin:0 auto;min-height:100vh;}

/* ---------------- masthead ---------------- */
.masthead{
  padding:2rem 1.5rem 1.1rem;
  border-bottom:1px solid var(--line);
}
.mast-row{
  display:flex;justify-content:space-between;align-items:flex-end;
  gap:1rem;flex-wrap:wrap;margin-bottom:1.1rem;
}
.mark{flex:0 0 auto;}
.brand{display:flex;align-items:flex-end;gap:.6rem;}
.eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-soft);display:block;margin-bottom:.35rem;
}
.title{
  font-family:'Noto Serif Thai',serif;font-weight:700;
  font-size:clamp(24px,4vw,30px);line-height:1.1;color:var(--ink);
}
.toolbar{display:flex;gap:.55rem;align-items:center;flex-wrap:wrap;}

.legend{display:flex;gap:1.4rem;flex-wrap:wrap;align-items:center;}
.spool{display:flex;align-items:center;gap:.5rem;font-size:12.5px;color:var(--ink-soft);}
.spool i{
  width:16px;height:16px;border-radius:50%;display:inline-block;flex:0 0 auto;
  background:var(--tc);
  box-shadow: inset 0 0 0 2px var(--paper), inset 0 0 0 3px var(--tc);
  position:relative;
}
.spool span{color:var(--ink);font-weight:600;}

/* ---------------- buttons ---------------- */
.btn{
  font-size:13px;cursor:pointer;border-radius:3px;font-weight:600;
  padding:.5rem 1.05rem;transition:transform .12s ease;line-height:1.3;
}
.btn:active{transform:translateY(1px);}
.btn-stamp{
  background:var(--ink);color:var(--paper);border:1.5px solid var(--ink);
}
.btn-stamp:hover{transform:rotate(-1deg);}
.btn-outline{
  background:transparent;color:var(--ink);
  border:1.5px dashed var(--line);
}
.btn-outline:hover{border-color:var(--ink);}
.btn-danger{
  background:#7E3326;color:var(--paper);border:1.5px solid #7E3326;
}
.toggle{display:flex;border:1.5px solid var(--line);border-radius:4px;overflow:hidden;}
.toggle button{
  padding:.45rem 1rem;font-size:12.5px;border:none;background:transparent;
  color:var(--ink-soft);cursor:pointer;font-weight:600;
}
.toggle button.is-active{background:var(--ink);color:var(--paper);}

/* ---------------- key ---------------- */
.key{
  display:flex;gap:1.1rem;flex-wrap:wrap;align-items:center;
  padding:.7rem 1.5rem;border-bottom:1px solid var(--line-soft);
  background:var(--paper-deep);font-size:11px;color:var(--ink-soft);
}
.key-item{display:flex;align-items:center;gap:.4rem;}
.key-swatch{width:15px;height:15px;border-radius:2px;flex:0 0 auto;}

/* ---------------- table / "the weave" ---------------- */
.board{overflow-x:auto;padding:1.2rem 1.5rem 2.5rem;}
table.grid{border-collapse:separate;border-spacing:0;width:100%;min-width:980px;font-size:11.5px;}
.grid th, .grid td{border-bottom:1px solid var(--line-soft);border-right:1px solid var(--line-soft);}
.hd{
  font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--ink-soft);
  text-align:center;padding:.5rem .3rem;white-space:nowrap;background:var(--paper-deep);
  border-top:1px solid var(--line);
}
.hd-name{width:108px;min-width:108px;text-align:left;padding-left:.8rem;}
.hd-day{width:46px;min-width:46px;}

/* day tab: fabric flag shape */
.day-tab{
  position:relative;width:46px;min-width:46px;text-align:center;vertical-align:middle;
  font-family:'Noto Serif Thai',serif;font-weight:600;font-size:12.5px;color:var(--paper);
  background:var(--ink);border-bottom:3px solid var(--paper);
}
.day-tab span{
  display:inline-block;writing-mode:vertical-rl;text-orientation:mixed;padding:.6rem 0;letter-spacing:.04em;
}

.name-cell{
  padding:.25rem .6rem;background:var(--paper-deep);white-space:nowrap;
  border-right:2px solid var(--line);
}
.name-cell .who{display:flex;align-items:center;gap:.45rem;}
.name-cell .who i{width:9px;height:9px;border-radius:50%;background:var(--tc);flex:0 0 auto;}
.name-cell .who span{font-size:11px;color:var(--ink-soft);font-weight:600;}

.cell{
  height:32px;min-width:46px;text-align:center;vertical-align:middle;
  position:relative;background:var(--paper);padding:1px;
}

/* the weave: busy hours render as crossed thread in the owner's colour */
.is-busy{
  background-color: color-mix(in srgb, var(--tc) 13%, var(--paper));
  background-image:
    repeating-linear-gradient(45deg, color-mix(in srgb, var(--tc) 55%, transparent) 0 1.6px, transparent 1.6px 9px),
    repeating-linear-gradient(-45deg, color-mix(in srgb, var(--tc) 55%, transparent) 0 1.6px, transparent 1.6px 9px);
}
.is-conflict{
  background-color: color-mix(in srgb, var(--saffron) 16%, var(--paper));
  background-image:
    repeating-linear-gradient(45deg, color-mix(in srgb, var(--saffron) 60%, transparent) 0 1.6px, transparent 1.6px 9px),
    repeating-linear-gradient(-45deg, color-mix(in srgb, var(--saffron) 60%, transparent) 0 1.6px, transparent 1.6px 9px);
}
.is-booked{background:color-mix(in srgb, var(--moss) 14%, var(--paper));}

.cell-label{
  display:inline-block;font-size:9px;line-height:1.25;color:var(--ink);font-weight:600;
}
.cell-label small{display:block;font-size:8px;font-weight:500;color:var(--ink-soft);}

.patch-btn{
  background:var(--saffron);border:1px dashed var(--paper);border-radius:3px;color:var(--paper);
  font-size:8.5px;font-weight:700;padding:3px 5px;cursor:pointer;white-space:nowrap;
  font-family:'IBM Plex Mono',monospace;letter-spacing:.02em;
}

.book-tag{
  display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:9px;
  color:var(--paper);font-size:9px;font-weight:700;background:var(--tc);
}
.book-tag button{
  background:none;border:none;color:var(--paper);opacity:.8;cursor:pointer;
  font-size:11px;padding:0;line-height:1;
}

/* ---------------- list view ---------------- */
.listwrap{padding:1.2rem 1.5rem 2.5rem;}
.empty{text-align:center;padding:3.5rem 1rem;}
.empty .needle{margin:0 auto 1rem;display:block;}
.empty p{font-family:'Noto Serif Thai',serif;font-size:15px;color:var(--ink-soft);margin:0 0 1rem;}

.day-group{margin-bottom:1.4rem;}
.day-heading{
  font-family:'Noto Serif Thai',serif;font-weight:700;font-size:14px;color:var(--ink);
  border-bottom:1px dashed var(--line);padding-bottom:.4rem;margin-bottom:.55rem;
}
.entry{
  display:flex;align-items:center;justify-content:space-between;gap:.6rem;flex-wrap:wrap;
  padding:.6rem .7rem;background:#FBF8EE;border:1px solid var(--line-soft);border-radius:3px;margin-bottom:.45rem;
}
.entry-who{display:flex;align-items:center;gap:.5rem;}
.entry-who i{width:9px;height:9px;border-radius:50%;background:var(--tc);flex:0 0 auto;}
.entry-name{font-weight:700;font-size:13px;color:var(--ink);margin-right:.45rem;}
.entry-time{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);}
.entry-note{font-size:11px;color:var(--ink-soft);font-style:italic;}
.cancel-link{
  padding:.3rem .6rem;background:transparent;border:1px dashed #B5685A;border-radius:3px;
  color:#7E3326;font-size:11px;cursor:pointer;font-weight:600;
}

/* ---------------- modal ---------------- */
.scrim{
  position:fixed;inset:0;background:rgba(44,38,32,.42);display:flex;
  align-items:center;justify-content:center;z-index:100;padding:1rem;
}
.card{
  background:var(--paper);width:100%;max-width:440px;border-radius:5px;
  padding:1.5rem;box-shadow:var(--card-shadow);position:relative;
  border:1px solid var(--line);
}
.card::before{
  content:"";position:absolute;left:18px;right:18px;top:0;height:0;
  border-top:2px dashed var(--line);
}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;}
.card-eyebrow{
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ink-soft);
}
.card-close{background:none;border:none;font-size:16px;color:var(--ink-soft);cursor:pointer;}
.card-sub{font-size:12px;color:var(--ink-soft);margin:0 0 .9rem;}

.person-btn{
  display:flex;align-items:center;gap:.65rem;width:100%;text-align:left;
  padding:.7rem .85rem;border-radius:4px;border:1.5px solid var(--line-soft);
  background:#FBF8EE;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink);
  margin-bottom:.55rem;
}
.person-btn i{width:11px;height:11px;border-radius:50%;background:var(--tc);flex:0 0 auto;}
.person-btn .go{margin-left:auto;color:var(--line);font-size:15px;}

.meta-row{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;}
.meta-tag{
  display:inline-flex;align-items:center;gap:.4rem;padding:3px 10px;border-radius:3px;
  background:var(--paper-deep);border:1px solid var(--line);font-size:12px;font-weight:600;color:var(--ink);
}
.meta-tag i{width:9px;height:9px;border-radius:50%;background:var(--tc);}
.back-link{background:none;border:none;font-size:12px;color:var(--ink-soft);cursor:pointer;padding:0;}

.field{margin-bottom:.85rem;}
.field label{
  display:block;font-size:11px;color:var(--ink-soft);margin-bottom:.3rem;letter-spacing:.02em;
}
.input{
  width:100%;padding:.5rem .6rem;border:1.5px solid var(--line);border-radius:3px;
  background:#FBF8EE;font-size:13px;color:var(--ink);
}
textarea.input{resize:vertical;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.actions{display:flex;gap:.55rem;justify-content:flex-end;margin-top:1.2rem;}
.hint{font-size:11px;color:var(--ink-soft);margin-top:.6rem;font-style:italic;}

.tooltip{
  position:fixed;background:var(--ink);color:var(--paper);padding:4px 9px;border-radius:3px;
  font-size:11px;font-family:'IBM Plex Mono',monospace;pointer-events:none;z-index:200;
  white-space:nowrap;transform:translateY(-100%);
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState } = React;

/* ---------- data ---------- */
const MEMBERS = [
  { id: "pong", name: "พงศิริกุล หาญชนะ" },
  { id: "panat", name: "ปนัดดา จ้อยหว่าง" },
  { id: "chani", name: "ชนิกานต์ ทรงกลด" },
];
const DAYS = ["จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์"];
const HOURS = Array.from({ length: 14 }, (_, i) => i + 8);
const SCHEDULE = [
  { day: "จันทร์", s: 9, e: 12, room: "B1138", code: "ENG32 4314", members: ["pong","panat","chani"] },
  { day: "จันทร์", s: 13, e: 15, room: "สัมมนาวิศวพัฒน์2", code: "ENG32 4412", members: ["panat","chani"] },
  { day: "จันทร์", s: 13, e: 16, room: "B1208", code: "IST30 1104", members: ["pong"] },
  { day: "จันทร์", s: 17, e: 18.5, room: "B1120", code: "IST30 1601", members: ["panat"] },
  { day: "อังคาร", s: 8, e: 10, room: "B3101", code: "ENG30 2001", members: ["pong"] },
  { day: "อังคาร", s: 13, e: 15, room: "B1125", code: "ENG32 4315", members: ["pong","panat","chani"] },
  { day: "อังคาร", s: 17, e: 19, room: "B1135", code: "IST30 1201", members: ["chani"] },
  { day: "พุธ", s: 10, e: 12, room: "B1212", code: "ENG32 4313", members: ["panat"] },
  { day: "พุธ", s: 13, e: 15, room: "B1119", code: "ENG32 4412", members: ["panat","chani"] },
  { day: "พุธ", s: 17, e: 18.5, room: "B1120", code: "IST30 1601", members: ["panat"] },
  { day: "พฤหัสบดี", s: 8, e: 10, room: "B3101", code: "ENG30 2001", members: ["pong"] },
  { day: "พฤหัสบดี", s: 10, e: 12, room: "B1135", code: "ENG32 4313", members: ["panat"] },
  { day: "พฤหัสบดี", s: 16, e: 19, room: "B4101", code: "CWI01 4100", members: ["panat"] },
  { day: "พฤหัสบดี", s: 17, e: 18, room: "B1125", code: "IST30 1201", members: ["chani"] },
  { day: "ศุกร์", s: 10, e: 12, room: "B1117", code: "ENG32 4315", members: ["pong","panat","chani"] },
];
const THREAD = { pong: "var(--rust)", panat: "var(--moss)", chani: "var(--indigo)" };

function findClass(personId, day, hour) {
  return SCHEDULE.find((c) => c.day === day && c.members.includes(personId) && hour >= c.s && hour < c.e);
}
function isBusy(personId, day, hour) { return !!findClass(personId, day, hour); }
function fmt(h) { return `${Math.floor(h)}:${h % 1 === 0.5 ? "30" : "00"}`; }

/* ---------- small needle/thread brand mark ---------- */
function NeedleMark({ size = 30 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" className="mark" aria-hidden="true">
      <path d="M5 5 L27 27 M5 11 L21 27 M5 17 L15 27 M5 23 L9 27 M27 5 L5 27 M27 11 L11 27 M27 17 L17 27 M27 23 L23 27"
        stroke="currentColor" strokeWidth="1.4" opacity="0.55" />
    </svg>
  );
}

function App() {
  const [bookings, setBookings] = useState([]);
  const [modal, setModal] = useState(null);
  const [person, setPerson] = useState(null);
  const [form, setForm] = useState({ day: "จันทร์", startH: 8, endH: 9, note: "" });
  const [cancelTarget, setCancelTarget] = useState(null);
  const [view, setView] = useState("table");
  const [tip, setTip] = useState(null);

  function openBooking() { setModal("person"); setPerson(null); }
  function closeModal() { setModal(null); setPerson(null); }

  function freeHoursOnDay(personId, day) { return HOURS.filter((h) => h < 21 && !isBusy(personId, day, h)); }
  function freeEndOptions(personId, day, startH) {
    const out = [];
    for (let h = startH + 1; h <= 21 && !(h > startH + 1 && isBusy(personId, day, h - 1)); h++) out.push(h);
    return out;
  }

  function selectPerson(personId) {
    setPerson(personId);
    const draft = { day: "จันทร์", startH: 8, endH: 9, note: "" };
    for (const day of DAYS) {
      for (const h of HOURS) {
        if (h < 21 && !isBusy(personId, day, h)) {
          draft.day = day; draft.startH = h; draft.endH = Math.min(h + 1, 21);
          setForm(draft); setModal("form"); return;
        }
      }
    }
    setForm(draft); setModal("form");
  }

  function submitBooking() {
    if (!person) return;
    const { day, startH, endH, note } = form;
    if (bookings.some((b) => b.day === day && b.person === person && b.startH < endH && b.endH > startH)) {
      alert("ช่วงเวลานี้มีการจองแล้ว กรุณาเลือกเวลาอื่น"); return;
    }
    setBookings([...bookings, { id: Date.now() + "", day, person, startH, endH, note, at: new Date() }]);
    closeModal();
  }

  function canCancel(booking) {
    const dayIdx = { จันทร์: 1, อังคาร: 2, พุธ: 3, พฤหัสบดี: 4, ศุกร์: 5 };
    const now = new Date();
    const diff = (dayIdx[booking.day] - now.getDay() + 7) % 7 || 7;
    const target = new Date(now);
    target.setDate(now.getDate() + diff);
    target.setHours(booking.startH, 0, 0, 0);
    return target.getTime() - now.getTime() > 3600000;
  }

  function confirmCancel() { setBookings(bookings.filter((b) => b.id !== cancelTarget?.id)); setCancelTarget(null); }

  const availableDays = person ? DAYS.filter((d) => freeHoursOnDay(person, d).length > 0) : DAYS;
  const startOptions = person ? freeHoursOnDay(person, form.day) : [];
  const endOptions = person ? freeEndOptions(person, form.day, form.startH) : [];

  return (
    <div className="app">
      <header className="masthead">
        <div className="mast-row">
          <div className="brand">
            <NeedleMark />
            <div>
              <span className="eyebrow">availability · sampler</span>
              <div className="title">ตารางเวลาว่าง</div>
            </div>
          </div>
          <div className="toolbar">
            <button className="btn btn-stamp" onClick={openBooking}>+ ลงชื่อ</button>
            <div className="toggle">
              <button className={view === "table" ? "is-active" : ""} onClick={() => setView("table")}>ตาราง</button>
              <button className={view === "list" ? "is-active" : ""} onClick={() => setView("list")}>รายการ</button>
            </div>
          </div>
        </div>
        <div className="legend">
          {MEMBERS.map((m) => (
            <span className="spool" key={m.id} style={{ "--tc": THREAD[m.id] }}>
              <i></i><span>{m.name}</span>
            </span>
          ))}
        </div>
      </header>

      <div className="key">
        <span className="key-item"><span className="key-swatch" style={{ background: "color-mix(in srgb, var(--rust) 30%, var(--paper))" }}></span>ไม่ว่าง (สีด้ายเจ้าของวิชา)</span>
        <span className="key-item"><span className="key-swatch" style={{ background: "color-mix(in srgb, var(--saffron) 30%, var(--paper))" }}></span>หลายวิชาทับกัน</span>
        <span className="key-item"><span className="key-swatch" style={{ background: "color-mix(in srgb, var(--moss) 22%, var(--paper))" }}></span>ว่าง — มีคนลงชื่อ</span>
        <span className="key-item"><span className="key-swatch" style={{ background: "var(--paper)", border: "1px solid var(--line)" }}></span>ว่างทั้งหมด</span>
      </div>

      {view === "table"
        ? <TableView bookings={bookings} setCancelTarget={setCancelTarget} setTip={setTip} />
        : <ListView bookings={bookings} setCancelTarget={setCancelTarget} canCancel={canCancel} openModal={openBooking} />}

      {modal === "person" && (
        <Scrim onClose={closeModal}>
          <div className="card">
            <Head label="เลือกชื่อ" onClose={closeModal} />
            <p className="card-sub">เลือกชื่อก่อนเลือกวันและเวลาว่าง</p>
            {MEMBERS.map((m) => (
              <button key={m.id} className="person-btn" style={{ "--tc": THREAD[m.id] }} onClick={() => selectPerson(m.id)}>
                <i></i>{m.name}<span className="go">→</span>
              </button>
            ))}
            <p className="hint">* ยกเลิกได้ก่อนถึงเวลานัด 1 ชั่วโมง</p>
          </div>
        </Scrim>
      )}

      {modal === "form" && person && (
        <Scrim onClose={closeModal}>
          <div className="card">
            <Head label="ลงชื่อว่าง" onClose={closeModal} />
            <div className="meta-row">
              <span className="meta-tag" style={{ "--tc": THREAD[person] }}>
                <i></i>{MEMBERS.find((m) => m.id === person)?.name}
              </span>
              <button className="back-link" onClick={() => setModal("person")}>← เปลี่ยน</button>
            </div>
            <div className="field">
              <label>วัน</label>
              <select className="input" value={form.day} onChange={(e) => {
                const day = e.target.value;
                const startH = freeHoursOnDay(person, day)[0] ?? 8;
                const ends = freeEndOptions(person, day, startH);
                setForm({ ...form, day, startH, endH: ends[0] ?? startH + 1 });
              }}>
                {availableDays.map((d) => <option key={d} value={d}>{d}</option>)}
              </select>
            </div>
            <div className="grid2">
              <div className="field">
                <label>เวลาเริ่ม</label>
                <select className="input" value={form.startH} onChange={(e) => {
                  const startH = Number(e.target.value);
                  const ends = freeEndOptions(person, form.day, startH);
                  setForm({ ...form, startH, endH: ends[0] ?? startH + 1 });
                }}>
                  {startOptions.map((h) => <option key={h} value={h}>{fmt(h)}</option>)}
                </select>
              </div>
              <div className="field">
                <label>เวลาสิ้นสุด</label>
                <select className="input" value={form.endH} onChange={(e) => setForm({ ...form, endH: Number(e.target.value) })}>
                  {endOptions.map((h) => <option key={h} value={h}>{fmt(h)}</option>)}
                </select>
              </div>
            </div>
            <div className="field">
              <label>หมายเหตุ (สาเหตุที่ไม่ว่าง / เพิ่มเติม)</label>
              <textarea className="input" rows={2} placeholder="เช่น ประชุมกลุ่ม, นัดส่วนตัว" value={form.note}
                onChange={(e) => setForm({ ...form, note: e.target.value })} />
            </div>
            <div className="actions">
              <button className="btn btn-outline" onClick={closeModal}>ยกเลิก</button>
              <button className="btn btn-stamp" onClick={submitBooking}>✓ ลงชื่อ</button>
            </div>
            <p className="hint">* ยกเลิกได้ก่อนถึงเวลานัด 1 ชั่วโมง</p>
          </div>
        </Scrim>
      )}

      {cancelTarget && (
        <Scrim onClose={() => setCancelTarget(null)}>
          <div className="card" style={{ maxWidth: 380 }}>
            <Head label="ยืนยันการยกเลิก" onClose={() => setCancelTarget(null)} />
            <p style={{ fontSize: 13, lineHeight: 1.75, margin: "0.5rem 0 1rem" }}>
              ยกเลิกการลงชื่อวัน <strong>{cancelTarget.day}</strong> เวลา {fmt(cancelTarget.startH)}–{fmt(cancelTarget.endH)} ของ{" "}
              <strong>{MEMBERS.find((m) => m.id === cancelTarget.person)?.name}</strong>?
            </p>
            <div className="actions">
              <button className="btn btn-outline" onClick={() => setCancelTarget(null)}>ไม่ยกเลิก</button>
              <button className="btn btn-danger" onClick={confirmCancel}>ยกเลิกการจอง</button>
            </div>
          </div>
        </Scrim>
      )}

      {tip && <div className="tooltip" style={{ top: tip.y, left: tip.x }}>{tip.text}</div>}
    </div>
  );
}

function Scrim({ children, onClose }) {
  return <div className="scrim" onClick={onClose}><div onClick={(e) => e.stopPropagation()}>{children}</div></div>;
}
function Head({ label, onClose }) {
  return (
    <div className="card-head">
      <span className="card-eyebrow">{label}</span>
      <button className="card-close" onClick={onClose}>✕</button>
    </div>
  );
}

function TableView({ bookings, setCancelTarget, setTip }) {
  const [conflictView, setConflictView] = useState(null);

  function classesAt(day, hour) {
    const seen = new Set(); const list = [];
    for (const m of MEMBERS) {
      const c = findClass(m.id, day, hour);
      if (c && !seen.has(c)) { seen.add(c); list.push(c); }
    }
    return list;
  }
  function isContinuation(rowIdx, day, hour) {
    if (rowIdx === 0) return false;
    const c = findClass(MEMBERS[rowIdx].id, day, hour);
    return c ? findClass(MEMBERS[rowIdx - 1].id, day, hour) === c : false;
  }
  function spanLen(rowIdx, day, hour) {
    const c = findClass(MEMBERS[rowIdx].id, day, hour);
    if (!c) return 1;
    let n = 1;
    for (let i = rowIdx + 1; i < MEMBERS.length && findClass(MEMBERS[i].id, day, hour) === c; i++) n++;
    return n;
  }

  return (
    <div className="board">
      {conflictView && (
        <Scrim onClose={() => setConflictView(null)}>
          <div className="card" style={{ maxWidth: 360 }}>
            <Head label={`${conflictView.day} ${fmt(conflictView.startH)}–${fmt(conflictView.endH)}`} onClose={() => setConflictView(null)} />
            <p style={{ fontSize: 12, color: "var(--ink-soft)", margin: "0 0 10px" }}>มีหลายวิชาในช่วงเวลานี้:</p>
            {conflictView.blocks.map((c, i) => (
              <div key={i} style={{ padding: "10px 12px", background: "#FBF8EE", border: "1px solid var(--line-soft)", borderRadius: 4, marginBottom: 8 }}>
                <div style={{ fontWeight: 700, fontSize: 13 }}>{c.code}</div>
                <div style={{ fontSize: 11, color: "var(--ink-soft)", marginTop: 2 }}>ห้อง {c.room} · {fmt(c.s)}–{fmt(c.e)}</div>
                <div style={{ display: "flex", gap: 5, marginTop: 4, flexWrap: "wrap" }}>
                  {c.members.map((mid) => {
                    const m = MEMBERS.find((x) => x.id === mid);
                    return m ? (
                      <span key={mid} style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 10, padding: "2px 7px", background: "var(--paper)", border: "1px solid var(--line)", borderRadius: 10 }}>
                        <i style={{ width: 7, height: 7, borderRadius: "50%", background: THREAD[mid], display: "inline-block" }}></i>
                        {m.name.split(" ")[0]}
                      </span>
                    ) : null;
                  })}
                </div>
              </div>
            ))}
          </div>
        </Scrim>
      )}

      <table className="grid">
        <thead>
          <tr>
            <th className="hd hd-day"></th>
            <th className="hd hd-name">ชื่อ</th>
            {HOURS.map((h) => <th key={h} className="hd">{fmt(h)}</th>)}
          </tr>
        </thead>
        <tbody>
          {DAYS.map((day) =>
            MEMBERS.map((m, rowIdx) => (
              <tr key={`${day}-${m.id}`}>
                {rowIdx === 0 && <td rowSpan={3} className="day-tab"><span>{day}</span></td>}
                <td className="name-cell">
                  <span className="who"><i style={{ background: THREAD[m.id] }}></i><span>{m.name.split(" ")[0]}</span></span>
                </td>
                {HOURS.map((h) => {
                  if (isContinuation(rowIdx, day, h)) return null;
                  const c = findClass(m.id, day, h);
                  const booking = bookings.find((b) => b.day === day && b.person === m.id && b.startH <= h && b.endH > h);
                  const span = c ? spanLen(rowIdx, day, h) : 1;
                  const others = classesAt(day, h);
                  const isConflict = !!c && others.length > 1;
                  const cls = ["cell", c ? (isConflict ? "is-conflict" : "is-busy") : (booking ? "is-booked" : "")].join(" ");
                  const isStart = c && h === c.s;
                  return (
                    <td key={h} className={cls} rowSpan={span > 1 ? span : undefined}
                      style={{ "--tc": THREAD[m.id] }}
                      onMouseEnter={(e) => {
                        if (!isConflict && c) setTip({ text: `${c.code} · ห้อง ${c.room}`, x: e.clientX + 8, y: e.clientY - 36 });
                        else if (!c && booking) setTip({ text: `จอง: ${booking.note || "ไม่มีหมายเหตุ"}`, x: e.clientX + 8, y: e.clientY - 36 });
                      }}
                      onMouseLeave={() => setTip(null)}
                    >
                      {isStart && !isConflict && (
                        <span className="cell-label">{c.code}<small>ห้อง {c.room}</small></span>
                      )}
                      {isStart && isConflict && (
                        <button className="patch-btn" onClick={(e) => { e.stopPropagation(); setConflictView({ day, startH: c.s, endH: c.e, blocks: others }); }} title="คลิกดูรายละเอียดวิชา">หลายวิชา ℹ</button>
                      )}
                      {booking && booking.startH === h && (
                        <span className="book-tag" style={{ background: THREAD[m.id] }}>
                          {m.name.split(" ")[0]}
                          <button onClick={(e) => { e.stopPropagation(); setCancelTarget(booking); }} title="ยกเลิก">×</button>
                        </span>
                      )}
                    </td>
                  );
                })}
              </tr>
            ))
          )}
        </tbody>
      </table>
    </div>
  );
}

function ListView({ bookings, setCancelTarget, canCancel, openModal }) {
  if (!bookings.length) {
    return (
      <div className="empty">
        <svg className="needle" width="40" height="40" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M5 5 L27 27 M5 17 L17 27 M27 5 L5 27 M27 17 L17 27" stroke="var(--ink-soft)" strokeWidth="1.5" opacity="0.6" />
        </svg>
        <p>ยังไม่มีการลงชื่อ</p>
        <button className="btn btn-stamp" onClick={openModal}>+ ลงชื่อว่าง</button>
      </div>
    );
  }
  const byDay = {};
  DAYS.forEach((d) => { byDay[d] = bookings.filter((b) => b.day === d); });
  return (
    <div className="listwrap">
      {DAYS.map((day) => {
        const list = byDay[day];
        if (!list?.length) return null;
        return (
          <div className="day-group" key={day}>
            <div className="day-heading">{day}</div>
            {list.map((b) => {
              const m = MEMBERS.find((x) => x.id === b.person);
              const ok = canCancel(b);
              return (
                <div className="entry" key={b.id}>
                  <div className="entry-who">
                    <i style={{ background: THREAD[b.person] }}></i>
                    <div>
                      <span className="entry-name">{m?.name}</span>
                      <span className="entry-time">{fmt(b.startH)} – {fmt(b.endH)}</span>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    {b.note && <span className="entry-note">{b.note}</span>}
                    <button className="cancel-link" style={{ opacity: ok ? 1 : .4, cursor: ok ? "pointer" : "not-allowed" }}
                      onClick={() => ok && setCancelTarget(b)} title={ok ? "ยกเลิก" : "เหลือเวลา < 1 ชม."}>ยกเลิก</button>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
